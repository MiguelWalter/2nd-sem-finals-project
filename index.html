<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>STAR RANGER | Mini Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0a2a, #010105);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .game-wrapper {
            background: rgba(5, 7, 20, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid rgba(0, 255, 255, 0.3);
            max-width: 850px;
            width: 100%;
        }
        .game-title {
            text-align: center;
            margin-bottom: 1rem;
        }
        .game-title h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #fff, #0ff, #f0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .canvas-container {
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: none;
            background: #03030f;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.8rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .score-box, .health-box {
            background: #000000aa;
            border-radius: 30px;
            padding: 5px 15px;
            font-weight: bold;
            color: #0ff;
            font-size: 0.9rem;
            border: 1px solid cyan;
        }
        .health-box {
            border-color: #ff6666;
            display: flex;
            gap: 5px;
        }
        .heart { font-size: 1.2rem; }
        .heart.active { color: #ff3366; }
        .heart.lost { color: #442222; opacity: 0.5; }
        .powerup-icons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .powerup-badge {
            background: #000000aa;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.7rem;
            border: 1px solid #0ff;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn {
            background: linear-gradient(95deg, #0a0f2a, #001d3d);
            border: 1px solid cyan;
            padding: 5px 15px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn:hover {
            background: #0ff;
            color: #000;
        }
        .controls {
            margin-top: 0.8rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.7rem;
            color: #88aaff;
        }
        .volume-slider {
            width: 60px;
            height: 3px;
            -webkit-appearance: none;
            background: #333;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #0ff;
            cursor: pointer;
        }
        @media (max-width: 600px) {
            .game-wrapper { padding: 1rem; }
            .game-title h1 { font-size: 1.5rem; }
            .info-bar { flex-direction: column; align-items: stretch; }
            .powerup-icons { order: 1; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-title">
        <h1>⭐ STAR RANGER ⭐</h1>
        <div style="font-size:0.7rem; color:#8aaaff;">BOSS every 500 | 5 Power-ups | 🔊 Sounds</div>
    </div>
    
    <div class="canvas-container">
        <canvas id="gameCanvas" width="800" height="500" style="width:100%;height:auto;aspect-ratio:800/500"></canvas>
    </div>
    
    <div class="info-bar">
        <div class="score-box" id="scoreDisplay">⭐ 0</div>
        <div class="health-box" id="healthDisplay">❤️ ❤️ ❤️</div>
        <div class="powerup-icons" id="powerupIcons"></div>
        <button class="btn" id="resetBtn">🔄 RESTART</button>
    </div>
    
    <div class="controls">
        <span>🖱️ MOUSE to move | 💥 AUTO-FIRE</span>
        <span>🔊 <input type="range" id="volume" class="volume-slider" min="0" max="100" value="60"> <span id="volVal">60%</span></span>
        <span>👑 BOSS at 500, 1000, 1500... (+50 HP each)</span>
    </div>
</div>

<script>
// ============ SOUND MANAGER (Compact) ============
class SoundFX {
    constructor() { this.vol = 0.6; this.ctx = null; this.init(); }
    init() {
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {}
    }
    play(type) {
        if (!this.ctx || this.ctx.state === 'closed') return;
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        gain.gain.value = this.vol * 0.3;
        let freq = 440, dur = 0.1;
        switch(type) {
            case 'shoot': freq = 880; dur = 0.07; break;
            case 'hit': freq = 660; dur = 0.05; break;
            case 'kill': freq = 220; dur = 0.2; break;
            case 'powerup': freq = 1046; dur = 0.15; break;
            case 'damage': freq = 174; dur = 0.12; break;
            case 'gameover': freq = 130; dur = 1; break;
            case 'boss': freq = 329; dur = 0.4; gain.gain.value = this.vol * 0.5; break;
            case 'bosskill': freq = 523; dur = 0.6; gain.gain.value = this.vol * 0.4; break;
            case 'nuke': freq = 98; dur = 0.5; gain.gain.value = this.vol * 0.4; break;
            case 'heal': freq = 783; dur = 0.12; break;
            default: return;
        }
        osc.type = 'sine';
        osc.frequency.value = freq;
        osc.start();
        osc.stop(this.ctx.currentTime + dur);
        gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + dur);
    }
    setVolume(v) { this.vol = v; }
}

const sound = new SoundFX();
document.getElementById('volume').oninput = (e) => {
    let v = e.target.value;
    document.getElementById('volVal').innerText = v + '%';
    sound.setVolume(v/100);
};
document.body.addEventListener('click', () => { if(sound.ctx && sound.ctx.state === 'suspended') sound.ctx.resume(); }, { once: true });

// ============ GAME ============
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width = 800, H = canvas.height = 500;

let score = 0, high = localStorage.getItem('srHigh') || 0;
let hp = 3, invincible = 0;
let bossLvl = 0, nextBoss = 500, bossActive = false, boss = null;
let enemies = [], bullets = [], enemyBullets = [], orbs = [], powerups = [];
let frame = 0, spawnTimer = 0;
let mouseX = W/2, mouseY = H-60;

let powerupTimers = { double:0, shield:0, rapid:0, doubleScore:0 };
let tempShield = false;

// Player
const player = { x:W/2, y:H-60, r:4 };

// UI Updates
function updateUI() {
    document.getElementById('scoreDisplay').innerHTML = `⭐ ${score} ${score>=nextBoss?'❗NEXT BOSS!':''}`;
    let hearts = ['❤️','❤️','❤️'];
    let total = hp + (tempShield?1:0);
    document.getElementById('healthDisplay').innerHTML = hearts.slice(0,total).map((h,i)=>i>=hp?'💚':h).join(' ');
    
    const container = document.getElementById('powerupIcons');
    container.innerHTML = '';
    if(powerupTimers.double>0) container.innerHTML += `<span class="powerup-badge">⚡×2 ${Math.ceil(powerupTimers.double/60)}s</span>`;
    if(powerupTimers.rapid>0) container.innerHTML += `<span class="powerup-badge">🔥${Math.ceil(powerupTimers.rapid/60)}s</span>`;
    if(powerupTimers.doubleScore>0) container.innerHTML += `<span class="powerup-badge">💰×2 ${Math.ceil(powerupTimers.doubleScore/60)}s</span>`;
    if(tempShield) container.innerHTML += `<span class="powerup-badge">🛡️+1</span>`;
}
function addScore(amt) { 
    let add = powerupTimers.doubleScore>0 ? amt*2 : amt;
    score += add;
    if(score>high) { high=score; localStorage.setItem('srHigh',high); }
    updateUI();
}
function damage() {
    if(invincible>0) return;
    if(tempShield) { tempShield=false; invincible=30; sound.play('hit'); updateUI(); return; }
    hp--;
    sound.play('damage');
    if(hp<=0) { alert(`GAME OVER! Score: ${score}\nHigh Score: ${high}`); reset(); return; }
    invincible = 45;
    updateUI();
}
function heal() { if(hp<3){ hp++; sound.play('heal'); updateUI(); } }

function spawnBoss() {
    bossLvl++;
    boss = { x:W/2, y:70, r:38, hp:30+(bossLvl-1)*50, maxHp:30+(bossLvl-1)*50, lvl:bossLvl };
    bossActive = true;
    enemies = [];
    enemyBullets = [];
    nextBoss = (bossLvl+1)*500;
    sound.play('boss');
    updateUI();
}

function shoot() {
    if(powerupTimers.double>0) {
        bullets.push({x:player.x-5, y:player.y-6, r:3, vx:-1, vy:-7});
        bullets.push({x:player.x+5, y:player.y-6, r:3, vx:1, vy:-7});
    } else bullets.push({x:player.x, y:player.y-6, r:3, vx:0, vy:-7});
    sound.play('shoot');
}

function spawnEnemy() {
    if(bossActive) return;
    let types = ['normal','fast','spiral','shield','kamikaze','miner'];
    let type = types[Math.floor(Math.random()*types.length)];
    let e = { x:30+Math.random()*(W-60), y:-30, r:12, hp:1, type:type };
    if(type=='shield') e.hp=2;
    if(type=='fast') e.speedY=3.5;
    else if(type=='kamikaze') { e.speedY=0; e.charge=4.5; }
    else e.speedY=1.5+Math.floor(score/400)*0.5;
    enemies.push(e);
}

function bossAttack() {
    if(!boss) return;
    let angStep = frame*0.05;
    for(let i=0;i<12+boss.lvl;i++) {
        let ang = angStep + (i/12)*Math.PI*2;
        let spd = 3;
        enemyBullets.push({x:boss.x, y:boss.y, r:4, vx:Math.sin(ang)*spd, vy:Math.cos(ang)*spd});
    }
    if(boss.hp < boss.maxHp/2 && frame%10==0) {
        for(let i=0;i<8;i++) {
            let ang = (i/8)*Math.PI*2;
            enemyBullets.push({x:boss.x, y:boss.y, r:4, vx:Math.sin(ang)*3.5, vy:Math.cos(ang)*3.5});
        }
    }
}

function enemyShoot(e) {
    if(e.type=='spiral' && frame%25==0) {
        for(let i=0;i<12;i++) {
            let ang = frame*0.1 + (i/12)*Math.PI*2;
            enemyBullets.push({x:e.x, y:e.y, r:3.5, vx:Math.sin(ang)*2.5, vy:Math.cos(ang)*2});
        }
    }
    else if(e.type=='shield' && frame%30==0) {
        for(let i=-1;i<=1;i++) enemyBullets.push({x:e.x, y:e.y, r:4, vx:i*2.5, vy:2});
    }
    else if(e.type!='kamikaze' && e.type!='miner' && frame%25==0) {
        let dx = player.x - e.x, dy = player.y - e.y;
        let len = Math.hypot(dx,dy);
        if(len>0) enemyBullets.push({x:e.x, y:e.y, r:4, vx:dx/len*3, vy:dy/len*2.5});
    }
}

// Update timers
function updateTimers() {
    for(let k in powerupTimers) if(powerupTimers[k]>0) powerupTimers[k]--;
    if(invincible>0) invincible--;
}

// Game loop
function update() {
    frame++;
    updateTimers();
    
    // Boss spawn
    if(score>=nextBoss && !bossActive && bossLvl<20) spawnBoss();
    
    // Auto shoot
    let rate = powerupTimers.rapid>0 ? 3 : 5;
    if(frame%rate==0) shoot();
    
    // Spawn enemies
    if(!bossActive && spawnTimer<=0) { spawnEnemy(); spawnTimer = 25 - Math.min(15,Math.floor(score/200)); }
    else spawnTimer--;
    
    // Boss update
    if(bossActive && boss) {
        boss.x = W/2 + Math.sin(frame*0.02)*40;
        if(frame%20==0) bossAttack();
        // Hit boss
        for(let i=0;i<bullets.length;i++) {
            if(Math.hypot(bullets[i].x-boss.x, bullets[i].y-boss.y) < bullets[i].r+boss.r) {
                boss.hp--; bullets.splice(i,1); i--;
                if(boss.hp<=0) { bossActive=false; boss=null; addScore(100); sound.play('bosskill'); }
            }
        }
        if(boss && Math.hypot(player.x-boss.x, player.y-boss.y) < player.r+boss.r) damage();
    }
    
    // Update enemies
    for(let i=0;i<enemies.length;i++) {
        let e = enemies[i];
        if(e.type=='kamikaze') {
            let dx = player.x-e.x, dy = player.y-e.y, len = Math.hypot(dx,dy);
            if(len>0) { e.x += dx/len*4; e.y += dy/len*4; }
        } else e.y += e.speedY||1.5;
        
        if(e.y>H+50 || e.y<-50) { enemies.splice(i,1); i--; continue; }
        enemyShoot(e);
    }
    
    // Bullet collisions
    for(let i=0;i<bullets.length;i++) {
        bullets[i].x += bullets[i].vx;
        bullets[i].y += bullets[i].vy;
        if(bullets[i].y<-20) { bullets.splice(i,1); i--; continue; }
        let hit = false;
        for(let j=0;j<enemies.length;j++) {
            let e = enemies[j];
            if(Math.hypot(bullets[i].x-e.x, bullets[i].y-e.y) < bullets[i].r+e.r) {
                e.hp--;
                if(e.hp<=0) {
                    // 50% powerup drop
                    if(Math.random()<0.5) {
                        let types = ['double','shield','rapid','doubleScore','tempShield','nuke'];
                        let pType = types[Math.floor(Math.random()*types.length)];
                        powerups.push({x:e.x, y:e.y, r:8, type:pType, life:150});
                    }
                    if(e.type=='miner') orbs.push({x:e.x, y:e.y, r:6, life:120});
                    enemies.splice(j,1);
                    addScore(10);
                    sound.play('kill');
                } else sound.play('hit');
                hit=true; break;
            }
        }
        if(hit) { bullets.splice(i,1); i--; }
    }
    
    // Powerup collection
    for(let i=0;i<powerups.length;i++) {
        let p = powerups[i];
        p.y += 1.5;
        p.life--;
        if(Math.hypot(player.x-p.x, player.y-p.y) < player.r+p.r) {
            switch(p.type) {
                case 'double': powerupTimers.double=600; break;
                case 'shield': powerupTimers.shield=720; break;
                case 'rapid': powerupTimers.rapid=480; break;
                case 'doubleScore': powerupTimers.doubleScore=600; break;
                case 'tempShield': if(!tempShield && hp<3) tempShield=true; break;
                case 'nuke': enemies=[]; enemyBullets=[]; sound.play('nuke'); break;
            }
            sound.play('powerup');
            powerups.splice(i,1); i--;
        } else if(p.life<=0 || p.y>H+50) { powerups.splice(i,1); i--; }
    }
    
    // Heal orbs
    for(let i=0;i<orbs.length;i++) {
        let o = orbs[i];
        o.y += 1.5;
        o.life--;
        if(Math.hypot(player.x-o.x, player.y-o.y) < player.r+o.r) { heal(); orbs.splice(i,1); i--; }
        else if(o.life<=0 || o.y>H+50) { orbs.splice(i,1); i--; }
    }
    
    // Enemy bullets
    for(let i=0;i<enemyBullets.length;i++) {
        let eb = enemyBullets[i];
        eb.x += eb.vx;
        eb.y += eb.vy;
        if(eb.y>H+50 || eb.y<-50 || eb.x<-50 || eb.x>W+50) { enemyBullets.splice(i,1); i--; continue; }
        if(Math.hypot(player.x-eb.x, player.y-eb.y) < player.r+eb.r) { damage(); enemyBullets.splice(i,1); i--; }
    }
    
    // Kamikaze collision
    for(let i=0;i<enemies.length;i++) {
        if(enemies[i].type=='kamikaze' && Math.hypot(player.x-enemies[i].x, player.y-enemies[i].y) < player.r+enemies[i].r) {
            damage(); enemies.splice(i,1); break;
        }
    }
    
    // Move player
    player.x = Math.min(W-20, Math.max(20, mouseX));
    player.y = Math.min(H-45, Math.max(45, mouseY));
    updateUI();
}

// Drawing
function draw() {
    ctx.fillStyle = '#050510'; ctx.fillRect(0,0,W,H);
    // Stars
    for(let i=0;i<150;i++) { ctx.fillStyle=`rgba(255,255,200,${0.3+Math.sin(frame*0.02+i)*0.2})`; ctx.beginPath(); ctx.arc((i*131)%W, (i*57+frame)%H, 1, 0, Math.PI*2); ctx.fill(); }
    
    // Enemy bullets
    enemyBullets.forEach(b=>{ ctx.beginPath(); ctx.arc(b.x,b.y,3,0,Math.PI*2); ctx.fillStyle='#ff4477'; ctx.fill(); });
    
    // Powerups
    powerups.forEach(p=>{ let c={'double':'#ff44ff','shield':'#44ff44','rapid':'#ff8844','doubleScore':'#ffdd44','tempShield':'#44ff44','nuke':'#ff4444'}[p.type]||'#0ff'; ctx.fillStyle=c; ctx.beginPath(); ctx.arc(p.x,p.y,p.r-2,0,Math.PI*2); ctx.fill(); ctx.fillStyle='white'; ctx.font='bold 14px monospace'; ctx.fillText({double:'⚡',shield:'🛡️',rapid:'🔥',doubleScore:'💰',tempShield:'🛡️',nuke:'💣'}[p.type]||'?', p.x-5, p.y+4); });
    
    // Orbs
    orbs.forEach(o=>{ ctx.fillStyle='#44ff44'; ctx.beginPath(); ctx.arc(o.x,o.y,4,0,Math.PI*2); ctx.fill(); ctx.fillStyle='white'; ctx.fillText('❤️', o.x-4, o.y+3); });
    
    // Boss
    if(bossActive && boss) { ctx.fillStyle=`hsl(${300-boss.lvl*10},70%,55%)`; ctx.beginPath(); ctx.arc(boss.x,boss.y,boss.r-5,0,Math.PI*2); ctx.fill(); ctx.fillStyle='white'; ctx.font='bold 18px monospace'; ctx.fillText('👑', boss.x-12, boss.y+8); ctx.font='10px monospace'; ctx.fillStyle='#ffffaa'; ctx.fillText(`LV${boss.lvl} ${boss.hp}/${boss.maxHp}`, boss.x-30, boss.y-20); }
    
    // Enemies
    enemies.forEach(e=>{ ctx.fillStyle=e.type=='spiral'?'#b266ff':e.type=='shield'?'#44ddff':e.type=='kamikaze'?'#ff8844':e.type=='miner'?'#66ff66':'#ff3a6f'; ctx.beginPath(); ctx.arc(e.x,e.y,e.r-3,0,Math.PI*2); ctx.fill(); ctx.fillStyle='white'; ctx.font='bold 12px monospace'; ctx.fillText({spiral:'🌀',shield:'🛡️',kamikaze:'💥',miner:'⛏️'}[e.type]||'⚔', e.x-6, e.y+4); if(e.type=='shield') { ctx.fillStyle='#ffffaa'; ctx.font='8px monospace'; ctx.fillText(`${e.hp}❤️`, e.x-5, e.y-7); } });
    
    // Player bullets
    bullets.forEach(b=>{ ctx.fillStyle='#0ff'; ctx.beginPath(); ctx.arc(b.x,b.y,3,0,Math.PI*2); ctx.fill(); });
    
    // Player
    if(!(invincible>0 && (Date.now()/50)%3<1)) {
        if(powerupTimers.double>0) { ctx.shadowBlur=10; ctx.shadowColor='#f0f'; }
        ctx.fillStyle='#0ff'; ctx.beginPath(); ctx.arc(player.x,player.y,player.r+2,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(player.x,player.y,player.r,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='red'; ctx.beginPath(); ctx.arc(player.x,player.y,2,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
    }
    
    // UI Text
    ctx.fillStyle='#0ff'; ctx.font='bold 18px monospace'; ctx.fillText(`SCORE ${score}`, 10, 30);
    if(bossActive) ctx.fillText(`⚔️ BOSS LV${boss.lvl} ⚔️`, W-130, 30);
    if(powerupTimers.doubleScore>0) { ctx.fillStyle='#ffdd44'; ctx.fillText(`×2 SCORE!`, W-100, 60); }
}

function reset() { 
    score=0; hp=3; invincible=0; bossLvl=0; nextBoss=500; bossActive=false; boss=null;
    enemies=[]; bullets=[]; enemyBullets=[]; orbs=[]; powerups=[];
    powerupTimers={double:0,shield:0,rapid:0,doubleScore:0}; tempShield=false;
    frame=0; spawnTimer=0;
    updateUI();
}
function animate() { update(); draw(); requestAnimationFrame(animate); }

// Mouse
canvas.addEventListener('mousemove', (e) => {
    let rect = canvas.getBoundingClientRect();
    let sx = W/rect.width, sy = H/rect.height;
    mouseX = Math.min(W-20, Math.max(20, (e.clientX-rect.left)*sx));
    mouseY = Math.min(H-45, Math.max(45, (e.clientY-rect.top)*sy));
});
document.getElementById('resetBtn').onclick = () => reset();

reset();
animate();
</script>
</body>
</html>
